<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <title>错误监控测试</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
      }
      .section {
        margin: 30px 0;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      button {
        padding: 10px 20px;
        margin: 5px;
        font-size: 16px;
        cursor: pointer;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
      }
      button:hover {
        background: #0056b3;
      }
      .log {
        background: #f5f5f5;
        padding: 10px;
        margin-top: 10px;
        border-radius: 4px;
        max-height: 200px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
      }
    </style>

  <body>
    <h1>前端监控错误测试</h1>

    <div class="section">
      <h2>1. JavaScript 错误测试</h2>
      <button onclick="throwError()">抛出普通错误</button>
      <button onclick="throwTypeError()">抛出类型错误</button>
      <button onclick="undefinedFunction()">调用未定义函数</button>
      <div class="log" id="js-log"></div>
    </div>

    <div class="section">
      <h2>2. Promise 错误测试</h2>
      <button onclick="rejectPromise()">Promise Reject</button>
      <button onclick="asyncError()">Async 函数错误</button>
      <div class="log" id="promise-log"></div>
    </div>

    <div class="section">
      <h2>3. 资源加载错误测试</h2>
      <button onclick="loadMissingScript()">加载不存在的 JS</button>
      <button onclick="loadMissingImage()">加载不存在的图片</button>
      <button onclick="loadMissingCSS()">加载不存在的 CSS</button>
      <div class="log" id="resource-log"></div>
    </div>

    <div class="section">
      <h2>4. XHR/Fetch 请求测试</h2>
      <button onclick="testXHR()">测试 XHR 请求</button>
      <button onclick="testFetch()">测试 Fetch 请求</button>
      <button onclick="testXHRError()">测试 XHR 错误</button>
      <div class="log" id="xhr-log"></div>
    </div>

    <div class="section">
      <h2>5. 用户行为测试</h2>
      <button onclick="testClick()">点击测试</button>
      <button onclick="testHashChange()">Hash 变化测试</button>
      <div class="log" id="behavior-log"></div>
    </div>

    <div class="section">

      <button onclick="clearReceivedData()">清空数据</button>

    </div>
